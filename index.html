<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora — Asisten AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F19;
    --panel:#12172A;
    --panel-2:#171D33;
    --border:#262C45;
    --text:#ECEBF7;
    --text-dim:#8D92AD;
    --text-faint:#5B6080;
    --teal:#5EE6C9;
    --violet:#8B6CF6;
    --pink:#F472B6;
    --user-bubble:#5B4FE0;
    --error:#FB7185;
    --error-bg:#FB718518;
    --sans:'Inter', system-ui, sans-serif;
    --display:'Outfit', system-ui, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(60% 50% at 80% 0%, #2A1F4D55, transparent),
      radial-gradient(50% 40% at 10% 10%, #11362F55, transparent),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }
  button{font-family:var(--display);cursor:pointer;}
  input,textarea,select{font-family:var(--sans);}
  ::selection{background:#8B6CF655;}
  :focus-visible{outline:2px solid var(--teal);outline-offset:2px;}

  /* ---------- TOP BAR ---------- */
  .top-bar{
    flex:none;
    display:flex;
    justify-content:flex-end;
    gap:8px;
    padding:14px 16px 0;
    z-index:6;
  }
  .icon-btn{
    background:rgba(255,255,255,0.04);
    border:1px solid var(--border);
    color:var(--text-dim);
    border-radius:10px;
    width:36px;height:36px;
    display:flex;align-items:center;justify-content:center;
    transition:.15s border-color, .15s color;
  }
  .icon-btn:hover{border-color:var(--teal);color:var(--teal);}
  .icon-btn svg{width:16px;height:16px;}

  /* ---------- COMPANION / ORB ---------- */
  .companion{
    flex:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    padding:4px 0 14px;
  }
  .orb-wrap{
    width:104px;height:104px;
    position:relative;
    filter:drop-shadow(0 0 26px #8B6CF640) drop-shadow(0 0 40px #5EE6C925);
  }
  .orb{
    width:100%;height:100%;
    border-radius:50%;
    position:relative;
    overflow:hidden;
    background:radial-gradient(circle at 35% 30%, #241A40, #0B0F19 70%);
    animation:breathe 4.6s ease-in-out infinite;
    transition:filter .4s;
  }
  .blob{
    content:'';
    position:absolute;
    width:140%;height:140%;
    top:-20%;left:-20%;
    border-radius:50%;
    filter:blur(16px);
    mix-blend-mode:screen;
    opacity:.85;
  }
  .blob.b1{ background:radial-gradient(circle at 30% 30%, var(--teal), transparent 60%); animation:drift1 11s ease-in-out infinite; }
  .blob.b2{ background:radial-gradient(circle at 70% 65%, var(--violet), transparent 60%); animation:drift2 13s ease-in-out infinite; }
  .blob.b3{ background:radial-gradient(circle at 50% 80%, var(--pink), transparent 55%); animation:drift3 9.5s ease-in-out infinite; }

  .orb-wrap.active .orb{ animation-duration:1.7s; filter:none; }
  .orb-wrap.active .blob.b1{ animation-duration:3.2s; opacity:1; }
  .orb-wrap.active .blob.b2{ animation-duration:3.8s; opacity:1; }
  .orb-wrap.active .blob.b3{ animation-duration:2.6s; opacity:1; }
  .orb-wrap.active{ filter:drop-shadow(0 0 34px #8B6CF670) drop-shadow(0 0 54px #5EE6C950); }
  .orb-wrap.listening{ filter:drop-shadow(0 0 32px #8B6CF660) drop-shadow(0 0 48px #5EE6C940); }

  @keyframes breathe{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.045);} }
  @keyframes drift1{ 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(10%,-8%) scale(1.12);} 66%{transform:translate(-6%,6%) scale(.94);} }
  @keyframes drift2{ 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-12%,9%) scale(1.08);} }
  @keyframes drift3{ 0%,100%{transform:translate(0,0) rotate(0deg);} 50%{transform:translate(7%,-9%) rotate(18deg);} }
  @media (prefers-reduced-motion:reduce){ .orb,.blob{animation:none !important;} }

  .status-text{
    font-family:var(--display);
    font-size:12px;
    letter-spacing:.5px;
    color:var(--text-dim);
  }

  /* ---------- SETTINGS PANEL ---------- */
  .settings-wrap{
    flex:none;
    display:grid;
    grid-template-rows:0fr;
    transition:grid-template-rows .28s ease;
    background:var(--panel);
    z-index:5;
  }
  .settings-wrap.open{ grid-template-rows:1fr; border-bottom:1px solid var(--border); }
  .settings-inner{min-height:0;overflow:hidden;}
  .settings-grid{
    display:flex;
    flex-direction:column;
    gap:14px;
    padding:16px 18px;
    max-width:520px;
    margin:0 auto;
  }
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{
    font-family:var(--display);
    font-size:11px;
    letter-spacing:1px;
    color:var(--text-dim);
  }
  .field input[type=text], .field textarea{
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:8px;
    padding:9px 11px;
    font-size:13.5px;
  }
  .field textarea{resize:vertical;min-height:44px;}
  .checkrow{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-dim);}
  .checkrow input{accent-color:var(--teal);}
  .row-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .btn-accent{
    background:linear-gradient(135deg, var(--teal), var(--violet));
    color:#0B0F19;
    border:none;
    border-radius:8px;
    padding:9px 16px;
    font-size:12.5px;
    font-weight:600;
  }
  .btn-accent:hover{filter:brightness(1.07);}
  .conn-msg{font-size:12px;color:var(--text-dim);}
  .conn-msg.ok{color:var(--teal);}
  .conn-msg.bad{color:var(--error);}

  /* ---------- CHAT ---------- */
  main{ flex:1; overflow-y:auto; padding:6px 16px 10px; }
  .thread{max-width:620px;margin:0 auto;display:flex;flex-direction:column;gap:14px;}

  .empty{ text-align:center; color:var(--text-dim); margin-top:6vh; font-size:13.5px; line-height:1.6; }

  .msg{display:flex;max-width:84%;}
  .msg.user{align-self:flex-end;}
  .msg.assistant{align-self:flex-start;}
  .bubble{
    border-radius:16px;
    padding:11px 14px;
    font-size:14.5px;
    line-height:1.55;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .msg.user .bubble{ background:var(--user-bubble); color:#fff; border-bottom-right-radius:5px; }
  .msg.assistant .bubble{
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    backdrop-filter:blur(6px);
    border-bottom-left-radius:5px;
  }
  .cursor{display:inline-block;width:6px;background:var(--teal);margin-left:1px;animation:blink 1s steps(1) infinite;border-radius:1px;}
  @keyframes blink{50%{opacity:0;}}

  .msg.error .bubble{ background:var(--error-bg); border:1px solid var(--error); color:#FFD8D2; border-radius:12px; }
  .retry-btn{
    margin-top:6px; background:transparent; border:1px solid var(--error); color:var(--error);
    border-radius:8px; padding:5px 12px; font-size:11.5px;
  }
  .retry-btn:hover{ background:var(--error); color:#1A0705; }

  /* ---------- COMPOSER ---------- */
  footer{ flex:none; padding:10px 16px 14px; }
  .composer{
    max-width:620px;margin:0 auto;
    display:flex;gap:8px;align-items:flex-end;
    background:var(--panel-2);
    border:1px solid var(--border);
    border-radius:18px;
    padding:8px 8px 8px 16px;
  }
  .composer:focus-within{ border-color:var(--teal); }
  .composer textarea{
    flex:1;background:transparent;border:none;color:var(--text);
    resize:none;font-size:14.5px;line-height:1.5;max-height:140px;padding:8px 0;
  }
  .send-btn{
    flex:none;background:linear-gradient(135deg, var(--teal), var(--violet));color:#0B0F19;border:none;
    border-radius:14px;padding:10px 18px;font-size:13px;font-weight:600;
  }
  .send-btn:disabled{opacity:.5;}
  .stop-btn{
    flex:none;background:transparent;color:var(--error);border:1px solid var(--error);
    border-radius:14px;padding:10px 18px;font-size:13px;
  }
  main::-webkit-scrollbar{width:8px;}
  main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  @media (max-width:480px){ .msg{max-width:90%;} .orb-wrap{width:88px;height:88px;} }
</style>
</head>
<body>

<div class="top-bar">
  <button class="icon-btn" id="resetBtn" title="Hapus riwayat percakapan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>
  </button>
  <button class="icon-btn" id="settingsBtn" title="Pengaturan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h0a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55h0a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v0a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>
  </button>
</div>

<div class="companion">
  <div class="orb-wrap" id="orbWrap">
    <div class="orb">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
    </div>
  </div>
  <div class="status-text" id="statusText">tenang</div>
</div>

<div class="settings-wrap" id="settingsWrap">
  <div class="settings-inner">
    <div class="settings-grid">
      <div class="field">
        <label>MODEL</label>
        <input type="text" id="modelInput" list="modelList" value="gemini-2.5-flash">
        <datalist id="modelList">
          <option value="gemini-2.5-flash">
          <option value="gemini-2.5-flash-lite">
          <option value="gemini-2.5-pro">
        </datalist>
      </div>
      <div class="field">
        <label>PROMPT SISTEM (opsional)</label>
        <textarea id="systemPrompt" placeholder="Contoh: Jawab singkat dan ramah dalam Bahasa Indonesia."></textarea>
      </div>
      <div class="row-actions">
        <button type="button" class="btn-accent" id="testBtn">Tes Koneksi</button>
        <label class="checkrow"><input type="checkbox" id="streamToggle" checked> Stream jawaban</label>
        <span class="conn-msg" id="connMsg"></span>
      </div>
    </div>
  </div>
</div>

<main id="main">
  <div class="thread" id="thread">
    <div class="empty" id="emptyState">Tulis pesan di bawah untuk mulai mengobrol ✨</div>
  </div>
</main>

<footer>
  <div class="composer">
    <textarea id="input" rows="1" placeholder="Tulis pesan…"></textarea>
    <button class="send-btn" id="sendBtn">Kirim</button>
  </div>
</footer>

<script>
(function(){
  const els = {
    orbWrap: document.getElementById('orbWrap'),
    statusText: document.getElementById('statusText'),
    settingsBtn: document.getElementById('settingsBtn'),
    settingsWrap: document.getElementById('settingsWrap'),
    modelInput: document.getElementById('modelInput'),
    systemPrompt: document.getElementById('systemPrompt'),
    testBtn: document.getElementById('testBtn'),
    connMsg: document.getElementById('connMsg'),
    streamToggle: document.getElementById('streamToggle'),
    resetBtn: document.getElementById('resetBtn'),
    main: document.getElementById('main'),
    thread: document.getElementById('thread'),
    emptyState: document.getElementById('emptyState'),
    input: document.getElementById('input'),
    sendBtn: document.getElementById('sendBtn'),
  };

  const BASE_URL = '/api/chat';
  let history = [];
  let controller = null;
  let busy = false;

  // ---------- settings panel ----------
  els.settingsBtn.addEventListener('click', () => {
    els.settingsWrap.classList.toggle('open');
  });

  // orb bereaksi halus saat input difokus (efek "mendengarkan")
  els.input.addEventListener('focus', () => els.orbWrap.classList.add('listening'));
  els.input.addEventListener('blur', () => els.orbWrap.classList.remove('listening'));

  els.testBtn.addEventListener('click', async () => {
    const model = els.modelInput.value.trim();
    els.connMsg.textContent = 'menghubungi…';
    els.connMsg.className = 'conn-msg';
    try {
      const res = await fetch(`${BASE_URL}/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model, messages: [{ role: 'user', content: 'ping' }], max_tokens: 5, stream: false }),
      });
      if (!res.ok){
        const body = await res.text().catch(() => '');
        throw new Error(`HTTP ${res.status} ${body.slice(0,150)}`);
      }
      els.connMsg.textContent = '✓ tersambung ke Gemini';
      els.connMsg.className = 'conn-msg ok';
    } catch (err) {
      els.connMsg.textContent = describeNetworkError(err);
      els.connMsg.className = 'conn-msg bad';
    }
  });

  // ---------- reset ----------
  els.resetBtn.addEventListener('click', () => {
    if (busy) return;
    history = [];
    els.thread.innerHTML = '';
    els.thread.appendChild(els.emptyState);
  });

  // ---------- composer ----------
  els.input.addEventListener('input', () => {
    els.input.style.height = 'auto';
    els.input.style.height = Math.min(els.input.scrollHeight, 140) + 'px';
  });
  els.input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage();
    }
  });
  els.sendBtn.addEventListener('click', () => {
    if (busy){ if (controller) controller.abort(); return; }
    sendMessage();
  });

  function setBusy(b){
    busy = b;
    els.sendBtn.textContent = b ? 'Hentikan' : 'Kirim';
    els.sendBtn.classList.toggle('stop-btn', b);
    els.sendBtn.classList.toggle('send-btn', !b);
    els.input.disabled = b;
    els.orbWrap.classList.toggle('active', b);
    els.statusText.textContent = b ? 'berpikir…' : 'tenang';
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function describeNetworkError(err){
    if (err && err.name === 'AbortError') return 'dihentikan.';
    if (err && err.code === 429) {
      const wait = err.retryAfter ? `${err.retryAfter} detik` : 'sebentar';
      return `Sedang banyak yang ngobrol di sini. Tunggu ${wait} lalu coba lagi.`;
    }
    if (err instanceof TypeError) {
      return 'Permintaan gagal — cek koneksi atau coba lagi sebentar.';
    }
    return (err && err.message) ? err.message : 'Terjadi kesalahan tak terduga.';
  }

  function clearEmptyState(){
    if (els.emptyState.parentNode) els.emptyState.remove();
  }

  function addMessageNode(role){
    clearEmptyState();
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    wrap.appendChild(bubble);
    els.thread.appendChild(wrap);
    els.main.scrollTop = els.main.scrollHeight;
    return { wrap, bubble };
  }

  function addErrorNode(message, onRetry){
    clearEmptyState();
    const wrap = document.createElement('div');
    wrap.className = 'msg error';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = message;
    wrap.appendChild(bubble);
    if (onRetry){
      const btn = document.createElement('button');
      btn.className = 'retry-btn';
      btn.textContent = 'Coba lagi';
      btn.addEventListener('click', onRetry);
      wrap.appendChild(btn);
    }
    els.thread.appendChild(wrap);
    els.main.scrollTop = els.main.scrollHeight;
  }

  async function sendMessage(){
    const text = els.input.value.trim();
    if (!text || busy) return;
    const model = els.modelInput.value.trim();
    if (!model){
      els.settingsWrap.classList.add('open');
      addErrorNode('Nama model belum diisi.');
      return;
    }

    addMessageNode('user').bubble.textContent = text;
    history.push({ role: 'user', content: text });
    els.input.value = '';
    els.input.style.height = 'auto';

    await runRequest({ model });
  }

  async function runRequest({ model }){
    const sys = els.systemPrompt.value.trim();
    const messages = sys ? [{ role: 'system', content: sys }, ...history] : [...history];
    const useStream = els.streamToggle.checked;

    const node = addMessageNode('assistant');
    setBusy(true);
    controller = new AbortController();

    try {
      let finalContent = '';

      if (useStream){
        const res = await fetch(`${BASE_URL}/chat/completions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, messages, stream: true }),
          signal: controller.signal
        });
        if (res.status === 429){
          throw Object.assign(new Error('rate_limited'), { code: 429, retryAfter: res.headers.get('Retry-After') });
        }
        if (!res.ok){
          const errBody = await res.text().catch(() => '');
          throw new Error(`HTTP ${res.status} — ${errBody.slice(0,200) || res.statusText}`);
        }
        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        node.bubble.appendChild(cursor);

        while (true){
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const raw of lines){
            const line = raw.trim();
            if (!line.startsWith('data:')) continue;
            const dataStr = line.slice(5).trim();
            if (dataStr === '[DONE]') continue;
            try {
              const json = JSON.parse(dataStr);
              const delta = json.choices && json.choices[0] && json.choices[0].delta && json.choices[0].delta.content;
              if (delta){
                finalContent += delta;
                cursor.before(delta);
                els.main.scrollTop = els.main.scrollHeight;
              }
            } catch(e) { /* abaikan baris parsial */ }
          }
        }
        cursor.remove();
      } else {
        const res = await fetch(`${BASE_URL}/chat/completions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model, messages, stream: false }),
          signal: controller.signal
        });
        if (res.status === 429){
          throw Object.assign(new Error('rate_limited'), { code: 429, retryAfter: res.headers.get('Retry-After') });
        }
        if (!res.ok){
          const errBody = await res.text().catch(() => '');
          throw new Error(`HTTP ${res.status} — ${errBody.slice(0,200) || res.statusText}`);
        }
        const data = await res.json();
        finalContent = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
        node.bubble.textContent = finalContent;
      }

      if (!finalContent){
        node.bubble.textContent = '(respons kosong)';
      }
      history.push({ role: 'assistant', content: finalContent });

    } catch (err) {
      node.wrap.remove();
      const msg = describeNetworkError(err);
      addErrorNode(msg, () => runRequest({ model }));
    } finally {
      setBusy(false);
      controller = null;
      els.main.scrollTop = els.main.scrollHeight;
    }
  }
})();
</script>
</body>
</html>
